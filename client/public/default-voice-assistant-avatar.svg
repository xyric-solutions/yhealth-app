<svg width="400" height="400" viewBox="0 0 400 400" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background circle -->
  <circle cx="200" cy="200" r="200" fill="#1e293b"/>
  
  <!-- Face circle -->
  <circle cx="200" cy="180" r="80" fill="#475569"/>
  
  <!-- Body/Shoulders -->
  <ellipse cx="200" cy="280" rx="100" ry="80" fill="#475569"/>
  
  <!-- Simple features (eyes) -->
  <circle cx="180" cy="170" r="8" fill="#ffffff"/>
  <circle cx="220" cy="170" r="8" fill="#ffffff"/>
  
  <!-- Simple smile -->
  <path d="M 170 190 Q 200 210 230 190" stroke="#ffffff" stroke-width="4" fill="none" stroke-linecap="round"/>
  
  <!-- Text label -->
  <text x="200" y="350" font-family="Arial, sans-serif" font-size="24" fill="#94a3b8" text-anchor="middle">AI Assistant</text>
</svg>

